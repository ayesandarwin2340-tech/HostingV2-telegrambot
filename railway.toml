name: kelvin-vps-host
region: fra

# Use Python base image
docker:
  image: python:3.9-slim
  ports:
    - port: 8080
      protocol: http
  
  # Multi-stage commands: Install Node.js then Python dependencies
  commands:
    # Install Node.js and npm
    - apt-get update && apt-get install -y curl
    - curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
    - apt-get install -y nodejs
    - node --version
    - npm --version
    
    # Install Python dependencies
    - pip install --no-cache-dir -r requirements.txt
    
    # Create directories
    - mkdir -p kelvin_uploads kelvin_data
    
    # Run bot
    - python main.py

# Environment variables
env:
  - key: BOT_TOKEN
    value: ""
  - key: OWNER_ID
    value: ""
  - key: ADMIN_ID
    value: ""
  - key: YOUR_USERNAME
    value: ""
  - key: PORT
    value: "8080"

# Resources
resources:
  memory: 1024
  cpu: 500

scaling:
  min: 1
  max: 1
  target_mem: 80

health_check:
  path: /
  port: 8080
  interval: 30s
  timeout: 10s
  initial_delay: 30s
